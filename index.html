/* =========================================================================
   SHIP DATE LOGIC — dynamic, as spec requires
   ========================================================================= */
function parseSimDate(iso) {
  // iso YYYY-MM-DD
  if (!iso) return new Date();
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function computeShipDate(today) {
  const year = today.getFullYear();
  const month = today.getMonth();
  const day = today.getDate();
  let shipYear = year,shipMonth = month;
  if (day >= 15) {
    shipMonth = month + 1;
    if (shipMonth > 11) {shipMonth = 0;shipYear++;}
  }
  return new Date(shipYear, shipMonth, 15);
}

const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
const MONTHS_SHORT = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

function fmtShipLong(d) {return `${MONTHS[d.getMonth()]} ${d.getDate()}`;}
function fmtShipShort(d) {return `${MONTHS_SHORT[d.getMonth()]} ${d.getDate()}`;}

function cutoffNotice(today) {
  const cutoff = new Date(today.getFullYear(), today.getMonth(), 14);
  const nextCutoff = today.getDate() >= 15 ?
  new Date(today.getFullYear(), today.getMonth() + 1, 14) :
  cutoff;
  const diff = Math.ceil((nextCutoff - today) / (1000 * 60 * 60 * 24));
  return diff;
}

/* =========================================================================

   ========================================================================= */
const PRODUCTS = [
{

/* =========================================================================
   APP SHELL — routing, cart state, ship-date context
   ========================================================================= */
const { useState, useEffect, useMemo, useRef, useCallback } = React;

function useEditMode() {
  const [editing, setEditing] = useState(false);
  useEffect(() => {
    function onMsg(e) {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setEditing(true);else
      if (e.data.type === '__deactivate_edit_mode') setEditing(false);
    }
    window.addEventListener('message', onMsg);
    try {window.parent.postMessage({ type: '__edit_mode_available' }, '*');} catch {}
    return () => window.removeEventListener('message', onMsg);
  }, []);
  return editing;
}

function persistTweak(key, value) {
  try {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
  } catch {}
}

function App() {
  const [tweaks, setTweaks] = useState(TWEAKS);
  const editing = useEditMode();

  const today = useMemo(() => parseSimDate(tweaks.simulatedToday), [tweaks.simulatedToday]);
  const shipDate = useMemo(() => computeShipDate(today), [today]);
  const daysToCutoff = useMemo(() => cutoffNotice(today), [today]);

  // Routing
  const [route, setRoute] = useState(() => {
    try {return JSON.parse(localStorage.getItem('olnian_route')) || { name: 'home' };}
    catch {return { name: 'home' };}
  });
  const go = useCallback((name, params = {}) => {
    const r = { name, ...params };
    setRoute(r);
    try {localStorage.setItem('olnian_route', JSON.stringify(r));} catch {}
    window.scrollTo({ top: 0, behavior: 'instant' });
  }, []);

  // Cart
  const [cart, setCart] = useState(() => {
    try {return JSON.parse(localStorage.getItem('olnian_cart')) || [];}
    catch {return [];}
  });
  useEffect(() => {
    try {localStorage.setItem('olnian_cart', JSON.stringify(cart));} catch {}
  }, [cart]);

  const [cartOpen, setCartOpen] = useState(false);
  const [quizOpen, setQuizOpen] = useState(false);

  const addToCart = useCallback((productId, qty = 1, isSubscription = false) => {
    setCart((prev) => {
      const existing = prev.find((l) => l.id === productId);
      if (existing) {
        return prev.map((l) => l.id === productId ? { ...l, qty: l.qty + qty, isSubscription } : l);
      }
      return [...prev, { id: productId, qty, isSubscription }];
    });
    setCartOpen(true);
  }, []);

  const updateQty = useCallback((productId, qty) => {
    setCart((prev) => qty <= 0 ?
    prev.filter((l) => l.id !== productId) :
    prev.map((l) => l.id === productId ? { ...l, qty } : l));
  }, []);

  const cartCount = cart.reduce((n, l) => n + l.qty, 0);
  const subtotal = cart.reduce((sum, l) => {
    const p = PRODUCTS.find((p) => p.id === l.id);
    if (!p) return sum;
    const linePrice = l.isSubscription ? Math.round(p.price * 0.9 * 100) / 100 : p.price;
    return sum + linePrice * l.qty;
  }, 0);

  const setTweak = (key, value) => {
    setTweaks((t) => ({ ...t, [key]: value }));
    persistTweak(key, value);
  };

  const ctx = {
    today, shipDate, daysToCutoff,
    tweaks, cart, cartCount, subtotal,
    addToCart, updateQty, setCartOpen, go,
    openQuiz: () => setQuizOpen(true),
  };

  return (
    <div>
      <Header cartCount={cartCount} onOpenCart={() => setCartOpen(true)} go={go} route={route} />

      <main>
        {route.name === 'home' && <HomePage ctx={ctx} />}
        {route.name === 'product' && <ProductPage ctx={ctx} productId={route.id} />}
        {route.name === 'checkout' && <CheckoutPage ctx={ctx} />}
        {route.name === 'confirmation' && <ConfirmationPage ctx={ctx} order={route.order} />}
      </main>

      <Footer />

      <CartDrawer
        open={cartOpen}
        onClose={() => setCartOpen(false)}
        cart={cart}
        subtotal={subtotal}
        shipDate={ctx.shipDate}
        today={ctx.today}
        daysToCutoff={ctx.daysToCutoff}
        updateQty={updateQty}
        onCheckout={() => {setCartOpen(false);go('checkout');}} />
      

      {editing && <TweaksPanel tweaks={tweaks} setTweak={setTweak} />}

      <QuizModal
        open={quizOpen}
        onClose={() => setQuizOpen(false)}
        onOrder={() => { setQuizOpen(false); go('product', { id: 'creatine' }); }}
      />
    </div>);

}

          <div style={{ fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--espresso-60)', marginBottom: 32 }}>

    </div>);

}

/* =========================================================================
   CART DRAWER
   ========================================================================= */
function CartDrawer({ open, onClose, cart, subtotal, shipDate, today, daysToCutoff, updateQty, onCheckout }) {
  const [mounted, setMounted] = useState(open);
  const [closing, setClosing] = useState(false);

  useEffect(() => {
    if (open) {
      setMounted(true);
      setClosing(false);
      document.body.style.overflow = 'hidden';
    } else if (mounted) {
      setClosing(true);
      const t = setTimeout(() => {setMounted(false);setClosing(false);}, 280);
      document.body.style.overflow = '';
      return () => clearTimeout(t);
    }
    return () => {document.body.style.overflow = '';};
  }, [open]);

  if (!mounted) return null;
  const preCutoff = today.getDate() < 15;

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 50 }}>
      <div
        onClick={onClose}
        style={{
          position: 'absolute', inset: 0,
          background: 'rgba(92, 26, 0, 0.35)',
          animation: `${closing ? 'overlayOut' : 'overlayIn'} 0.28s ease both`
        }} />
      
      <aside style={{
        position: 'absolute', right: 0, top: 0, bottom: 0,
        width: 'min(480px, 100vw)',
        background: 'var(--blush)',
        display: 'flex', flexDirection: 'column',
        animation: `${closing ? 'slideOutRight' : 'slideInRight'} 0.28s ease both`,
        boxShadow: '-20px 0 40px rgba(92,26,0,0.08)'
      }}>
        <div style={{
          padding: '24px 28px',
          display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
          borderBottom: '1px solid var(--espresso-12)'
        }}>
          <h2 className="serif" style={{ fontSize: 32 }}>Your order</h2>
          <button onClick={onClose} style={{ fontSize: 13, color: 'var(--espresso-60)' }}>Close</button>
        </div>

        {/* Ship date message — as spec requires */}
        

        <div style={{ flex: 1, overflow: 'auto', padding: '12px 28px' }}>
          {cart.length === 0 ?
          <div style={{
            padding: '80px 0', textAlign: 'center',
            color: 'var(--espresso-60)'
          }}>
              <p className="serif" style={{ fontSize: 28, color: 'var(--espresso)' }}>Nothing here yet.</p>
              <p style={{ marginTop: 12, fontSize: 14 }}>Choose a format to begin.</p>
            </div> :

          cart.map((line) => {
            const p = PRODUCTS.find((p) => p.id === line.id);
            if (!p) return null;
            return (
              <div key={p.id} style={{
                display: 'grid',

              }}>
                  <div style={{ width: 80, height: 100, background: p.color, position: 'relative' }}>
                    <ProductIllustration product={p} />
                  </div>
                  <div>
                    <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
                      <div className="serif" style={{ fontSize: 24, lineHeight: 1 }}>{p.name}</div>
                      {line.isSubscription && (
                        <div style={{
                          fontSize: 9, letterSpacing: '0.14em', textTransform: 'uppercase',
                          background: 'var(--tangerine)', color: 'white',
                          padding: '2px 6px', lineHeight: '16px',
                        }}>Subscribe</div>
                      )}
                    </div>
                    <div style={{ fontSize: 12, color: 'var(--espresso-60)', marginTop: 4, letterSpacing: '0.02em' }}>
                      {p.subtitle} · {p.count}{line.isSubscription ? ' · monthly' : ''}
                    </div>
                    <div style={{ marginTop: 12, display: 'inline-flex', border: '1px solid var(--espresso-12)' }}>
                      <button onClick={() => updateQty(p.id, line.qty - 1)} style={{ width: 32, height: 32, fontSize: 14 }}>−</button>

                      <button onClick={() => updateQty(p.id, line.qty + 1)} style={{ width: 32, height: 32, fontSize: 14 }}>+</button>

                  <div style={{ textAlign: 'right' }}>

}

/* =========================================================================
   CHECKOUT (simplified — simulates Shopify native checkout)
   ========================================================================= */
function CheckoutPage({ ctx }) {
  const { cart, subtotal, go } = ctx;
  // Shopify-friendly field names (matches Shopify Storefront / Admin API address + customer schema).
  // Mapped:  contact.email -> customer.email
  //          contact.phone -> customer.phone / address.phone (SMS opt-in via acceptsSmsMarketing)
  //          shipping_address.{first_name, last_name, address1, city, province, zip, country}
  //          note attributes -> {health_checkin_opt_in: true/false}
  const [step, setStep] = useState('info'); // info | payment
  const [form, setForm] = useState({
    email: '',
    phone: '',
    acceptsSmsMarketing: true,
    healthCheckin: true, // note_attribute: olnian_health_checkin
    first_name: '',
    last_name: '',
    address1: '',
    address2: '',
    city: '',
    province: '',
    zip: '',
    country: 'United States',
    card: '', exp: '', cvc: ''
  });
  const [errors, setErrors] = useState({});
  const hasSubscription = cart.some(l => l.isSubscription);
  const shipping = hasSubscription || subtotal >= 60 ? 0 : 6;
  const tax = Math.round(subtotal * 0.0875 * 100) / 100;
  const total = subtotal + shipping + tax;

  if (cart.length === 0) {
    return (
      <div className="page-enter" style={{ padding: '120px 32px', textAlign: 'center' }} data-screen-label="Checkout empty">
        <h1 className="display-md" style={{ fontSize: 56, fontWeight: 300 }}>Nothing to check out.</h1>
        <p style={{ marginTop: 16, color: 'var(--espresso-60)' }}>Your bag is empty.</p>
        <button onClick={() => go('home')} style={{ ...ctaStyle(), marginTop: 32 }}>Back to Olnian</button>
      </div>);

  }

  function validateInfo() {
    const e = {};
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(form.email)) e.email = 'Enter a valid email';
    if (!/^[\d\s\-\(\)\+]{10,}$/.test(form.phone)) e.phone = 'Enter a valid phone number';
    if (!form.first_name) e.first_name = 'Required';
    if (!form.last_name) e.last_name = 'Required';
    if (!form.address1) e.address1 = 'Required';
    if (!form.city) e.city = 'Required';
    if (!form.province) e.province = 'Required';
    if (!form.zip) e.zip = 'Required';
    return e;
  }
  function validatePayment() {
    const e = {};
    if (form.card.replace(/\s/g, '').length < 12) e.card = 'Invalid card';
    if (!/^\d{2}\/\d{2}$/.test(form.exp)) e.exp = 'MM/YY';
    if (form.cvc.length < 3) e.cvc = '3 digits';
    return e;
  }

  function onContinue() {
    const e = validateInfo();
    setErrors(e);
    if (Object.keys(e).length === 0) {
      setStep('payment');
      window.scrollTo({ top: 0 });
    }
  }

  function onPlace() {
    const e = validatePayment();
    setErrors(e);
    if (Object.keys(e).length === 0) {
      // Shopify-shaped payload. When this connects to a Storefront API,
      // it can be sent directly as checkoutCreate input + customer update.
      const shopifyPayload = {
        email: form.email,
        phone: form.phone,
        acceptsSmsMarketing: form.acceptsSmsMarketing,
        shippingAddress: {
          firstName: form.first_name,
          lastName: form.last_name,
          address1: form.address1,
          address2: form.address2,
          city: form.city,
          province: form.province,
          zip: form.zip,
          country: form.country,
          phone: form.phone
        },
        lineItems: cart.map((l) => {
          const p = PRODUCTS.find((x) => x.id === l.id);
          return {
            variantSku: p && p.sku,
            quantity: l.qty,
            title: p && p.name,
            ...(l.isSubscription ? { sellingPlanHandle: 'monthly-subscription', properties: [{ name: '_subscription', value: 'true' }] } : {}),
          };
        }),
        noteAttributes: [
        { name: 'olnian_health_checkin', value: form.healthCheckin ? 'opted_in' : 'declined' },
        { name: 'has_subscription', value: hasSubscription ? 'true' : 'false' },
        { name: 'source', value: 'web_storefront' }]

      };
      const order = {
        id: 'OL-' + Math.floor(Math.random() * 900000 + 100000),
        email: form.email,
        phone: form.phone,
        firstName: form.first_name,
        healthCheckin: form.healthCheckin,
        lines: [...cart],
        subtotal, shipping, tax, total,
        shipDate: ctx.shipDate.toISOString(),
        shopify: shopifyPayload
      };
      // eslint-disable-next-line no-console
      console.log('Shopify checkout payload →', shopifyPayload);
      try {localStorage.setItem('olnian_cart', '[]');} catch {}
      cart.forEach((l) => ctx.updateQty(l.id, 0));
      go('confirmation', { order });
    }
  }

  return (
    <div className="page-enter" data-screen-label="Checkout">
      <div style={{
        maxWidth: 1200, margin: '0 auto',
        display: 'grid',
        gridTemplateColumns: '1.2fr 1fr',
        minHeight: 'calc(100vh - 80px)'
      }}>
        {/* Left — form */}
        <div style={{ padding: '56px 56px 80px' }}>
          <div style={{ fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--espresso-60)' }}>
            Checkout — Step {step === 'info' ? '1' : '2'} of 2
          </div>
          <h1 className="display-md" style={{ fontSize: 56, fontWeight: 300, marginTop: 16, lineHeight: 1, letterSpacing: '-0.03em' }}>
            {step === 'info' ? 'Where should we send it?' : 'Last thing.'}
          </h1>

          {step === 'info' ?
          <form onSubmit={(e) => {e.preventDefault();onContinue();}} style={{ marginTop: 40 }}>
              {/* Contact */}
              <SectionLabel>Contact</SectionLabel>
              <Field name="email" type="email" autoComplete="email"
            label="Email" value={form.email}
            onChange={(v) => setForm((f) => ({ ...f, email: v }))}
            error={errors.email} placeholder="you@example.com" />
              <Field name="phone" type="tel" autoComplete="tel"
            label="Mobile phone" value={form.phone}
            onChange={(v) => setForm((f) => ({ ...f, phone: v }))}
            error={errors.phone} placeholder="(555) 555-0100"
            hint="We'll send shipping updates. Never spam." />

              {/* Health check-in opt-in */}
              <Checkbox
              checked={form.healthCheckin}
              onChange={(v) => setForm((f) => ({ ...f, healthCheckin: v }))}
              title="Yes, include me in the Olnian health check-in"
              body="Our clinical team will text you twice — at week 4 and week 12 — to ask how you're feeling and offer dosage guidance. No cost. No obligation. Text STOP at any time." />
            
              <Checkbox
              checked={form.acceptsSmsMarketing}
              onChange={(v) => setForm((f) => ({ ...f, acceptsSmsMarketing: v }))}
              title="Text me about new batches and restocks"
              body="Occasional SMS from Olnian. Msg & data rates may apply." />
            

              {/* Shipping */}
              <SectionLabel style={{ marginTop: 32 }}>Ship to</SectionLabel>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                <Field name="first_name" autoComplete="given-name"
              label="First name" value={form.first_name}
              onChange={(v) => setForm((f) => ({ ...f, first_name: v }))}
              error={errors.first_name} />
                <Field name="last_name" autoComplete="family-name"
              label="Last name" value={form.last_name}
              onChange={(v) => setForm((f) => ({ ...f, last_name: v }))}
              error={errors.last_name} />
              </div>
              <Field name="address1" autoComplete="address-line1"
            label="Street address" value={form.address1}
            onChange={(v) => setForm((f) => ({ ...f, address1: v }))}
            error={errors.address1} />
              <Field name="address2" autoComplete="address-line2"
            label="Apt, suite, etc. (optional)" value={form.address2}
            onChange={(v) => setForm((f) => ({ ...f, address2: v }))} />
              <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr', gap: 16 }}>
                <Field name="city" autoComplete="address-level2"
              label="City" value={form.city}
              onChange={(v) => setForm((f) => ({ ...f, city: v }))}
              error={errors.city} />
                <Field name="province" autoComplete="address-level1"
              label="State" value={form.province}
              onChange={(v) => setForm((f) => ({ ...f, province: v }))}
              error={errors.province} placeholder="CA" />
                <Field name="zip" autoComplete="postal-code"
              label="ZIP" value={form.zip}
              onChange={(v) => setForm((f) => ({ ...f, zip: v }))}
              error={errors.zip} />
              </div>
              <button type="submit" style={{ ...ctaStyle(), marginTop: 24, width: '100%', justifyContent: 'center', padding: '18px' }}>
                Continue to payment <Arrow />
              </button>
            </form> :

          <form onSubmit={(e) => {e.preventDefault();onPlace();}} style={{ marginTop: 40 }}>
              <SectionLabel>Payment</SectionLabel>
              <Field name="cc-number" autoComplete="cc-number"
            label="Card number" value={form.card}
            onChange={(v) => setForm((f) => ({ ...f, card: v }))}
            error={errors.card} placeholder="4242 4242 4242 4242" />
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                <Field name="cc-exp" autoComplete="cc-exp"
              label="Expiry" value={form.exp}
              onChange={(v) => setForm((f) => ({ ...f, exp: v }))}
              error={errors.exp} placeholder="MM/YY" />
                <Field name="cc-csc" autoComplete="cc-csc"
              label="CVC" value={form.cvc}
              onChange={(v) => setForm((f) => ({ ...f, cvc: v }))}
              error={errors.cvc} placeholder="123" />
              </div>
              <button type="submit" style={{ ...ctaStyle(), marginTop: 24, width: '100%', justifyContent: 'center', padding: '18px' }}>
                Place order — ${total.toFixed(2)} <Arrow />
              </button>
              <button type="button" onClick={() => setStep('info')} style={{ marginTop: 12, fontSize: 13, color: 'var(--espresso-60)' }} className="uline">
                ← Back to shipping
              </button>
            </form>
          }

          <p style={{ marginTop: 32, fontSize: 11, color: 'var(--espresso-60)', lineHeight: 1.6, maxWidth: 480 }}>
            Your information is encrypted and processed via Shopify's PCI-compliant checkout.
            By placing your order you agree to the Terms and Privacy Policy.
          </p>
        </div>

        {/* Right — order summary (no ship-date chrome) */}
        <div style={{
          background: 'var(--flamingo)',
          padding: '56px 48px'
        }}>
          <div style={{ fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--espresso-60)', marginBottom: 20 }}>
            Your order
          </div>

          {cart.map((line) => {
            const p = PRODUCTS.find((p) => p.id === line.id);
            if (!p) return null;
            return (
              <div key={p.id} style={{
                display: 'grid',
                gridTemplateColumns: '60px 1fr auto',
                gap: 14,
                padding: '14px 0',
                alignItems: 'center'
              }}>
                <div style={{ width: 60, height: 75, background: p.color, position: 'relative' }}>
                  <ProductIllustration product={p} />
                  <div style={{
                    position: 'absolute', top: -6, right: -6,
                    background: 'var(--espresso)', color: 'var(--blush)',
                    width: 22, height: 22, borderRadius: '50%',
                    fontSize: 11, display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontVariantNumeric: 'tabular-nums'
                  }}>{line.qty}</div>
                </div>
                <div>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, flexWrap: 'wrap' }}>
                    <div className="display-md" style={{ fontSize: 20, lineHeight: 1, fontWeight: 400 }}>{p.name}</div>
                    {line.isSubscription && (
                      <div style={{ fontSize: 9, letterSpacing: '0.12em', textTransform: 'uppercase', background: 'var(--tangerine)', color: 'white', padding: '2px 5px' }}>Subscribe</div>
                    )}
                  </div>
                  <div style={{ fontSize: 12, color: 'var(--espresso-60)', marginTop: 3 }}>{p.count}{line.isSubscription ? ' · monthly' : ''}</div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontVariantNumeric: 'tabular-nums', fontSize: 14 }}>${((line.isSubscription ? Math.round(p.price * 0.9 * 100) / 100 : p.price) * line.qty).toFixed(2)}</div>
                  {line.isSubscription && <div style={{ fontSize: 11, color: 'var(--espresso-60)', textDecoration: 'line-through' }}>${(p.price * line.qty).toFixed(2)}</div>}
                </div>
              </div>);

          })}

          {hasSubscription && (
            <div style={{
              marginTop: 16, padding: '10px 14px',
              background: 'rgba(62, 207, 178, 0.25)',
              fontSize: 12, color: 'var(--espresso)',
              display: 'flex', alignItems: 'center', gap: 8,
            }}>
              <span style={{ color: 'var(--mint)', fontSize: 14 }}>✓</span>
              Free shipping included with your subscription
            </div>
          )}
          <div style={{ borderTop: '1px solid var(--espresso-12)', marginTop: 20, paddingTop: 20 }}>
            <SummaryRow label="Subtotal" value={`$${subtotal.toFixed(2)}`} />
            <SummaryRow label="Shipping" value={shipping === 0 ? (hasSubscription ? 'Free (subscription)' : 'Free') : `$${shipping.toFixed(2)}`} />
            <SummaryRow label="Tax (est.)" value={`$${tax.toFixed(2)}`} />
          </div>
          <div style={{ borderTop: '1px solid var(--espresso-12)', marginTop: 16, paddingTop: 16, display: 'flex', justifyContent: 'space-between' }}>
            <div className="display-md" style={{ fontSize: 26, fontWeight: 400 }}>Total</div>
            <div className="display-md" style={{ fontSize: 26, fontVariantNumeric: 'tabular-nums', fontWeight: 400 }}>${total.toFixed(2)}</div>
          </div>

          {form.healthCheckin &&
          <div style={{
            marginTop: 28,
            padding: '14px 16px',
            border: '1px solid rgba(92, 26, 0, 0.3)',

            color: 'var(--espresso)'
          }}>
              <strong style={{ fontWeight: 500 }}>Health check-in enabled.</strong>{' '}
              Week 4 and week 12 texts from our clinical team. Text STOP anytime.
            </div>
          }
        </div>
      </div>
    </div>);

}

function SectionLabel({ children, style }) {
  return (
    <div style={{
      fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase',
      color: 'var(--espresso-60)',
      marginBottom: 14,
      ...style
    }}>{children}</div>);

}

function Checkbox({ checked, onChange, title, body }) {
  return (
    <label style={{
      display: 'grid', gridTemplateColumns: '24px 1fr',
      gap: 12, padding: '12px 0',
      cursor: 'pointer',
      alignItems: 'flex-start'
    }}>
      <div
        role="checkbox"
        aria-checked={checked}
        onClick={() => onChange(!checked)}
        style={{
          width: 20, height: 20,
          border: `1.5px solid ${checked ? 'var(--tangerine)' : 'var(--espresso-30)'}`,
          background: checked ? 'var(--tangerine)' : 'transparent',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          marginTop: 1
        }}>
        
        {checked &&
        <svg width="12" height="12" viewBox="0 0 16 16">
            <path d="M3 8.5L6.5 12L13 4.5" stroke="white" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
        }
      </div>
      <div onClick={() => onChange(!checked)}>
        <div style={{ fontSize: 14, fontWeight: 400, color: 'var(--espresso)' }}>{title}</div>
        <div style={{ fontSize: 12, color: 'var(--espresso-60)', marginTop: 4, lineHeight: 1.5 }}>{body}</div>
      </div>
    </label>);

}

function Field({ label, value, onChange, error, placeholder, name, type, autoComplete, hint }) {
  return (
    <label style={{ display: 'block', marginBottom: 16 }}>
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
        fontSize: 11, letterSpacing: '0.15em', textTransform: 'uppercase',
        color: 'var(--espresso-60)', marginBottom: 6
      }}>
        <span>{label}</span>
        {hint && <span style={{ textTransform: 'none', letterSpacing: 0, fontSize: 11, opacity: 0.8 }}>{hint}</span>}
      </div>
      <input
        name={name}
        type={type || 'text'}
        autoComplete={autoComplete}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder}
        style={{
          width: '100%', padding: '14px 16px',
          background: 'white',
          border: `1px solid ${error ? 'var(--tangerine)' : 'var(--espresso-12)'}`,
          fontFamily: 'inherit', fontSize: 15, color: 'var(--espresso)',
          outline: 'none'
        }} />
      
      {error && <div style={{ fontSize: 12, color: 'var(--tangerine)', marginTop: 4 }}>{error}</div>}
    </label>);

}

function SummaryRow({ label, value }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', fontSize: 14 }}>
      <span style={{ color: 'var(--espresso-60)' }}>{label}</span>
      <span style={{ fontVariantNumeric: 'tabular-nums' }}>{value}</span>

}

/* =========================================================================
   QUIZ MODAL — "Should I take creatine?"
   Four questions. Three verdicts. No data capture.
   ========================================================================= */
function QuizModal({ open, onClose, onOrder }) {
  const [mounted, setMounted] = useState(false);
  const [closing, setClosing] = useState(false);
  const [step, setStep] = useState(0); // 0 = intro, 1..4 = questions, 5 = result
  const [answers, setAnswers] = useState({ q1: null, q2: [], q3: null, q4: null });

  useEffect(() => {
    if (open) {
      setMounted(true);
      setClosing(false);
      setStep(0);
      setAnswers({ q1: null, q2: [], q3: null, q4: null });
      document.body.style.overflow = 'hidden';
    } else if (mounted) {
      setClosing(true);
      const t = setTimeout(() => { setMounted(false); setClosing(false); }, 240);
      document.body.style.overflow = '';
      return () => clearTimeout(t);
    }
    return () => { document.body.style.overflow = ''; };
  }, [open]);

  if (!mounted) return null;

  function verdict() {
    // Physician gate — non-negotiable
    if (answers.q3 === 'yes') return 'physician';
    if (answers.q1 === 'no') return 'no';
    return 'yes';
  }

  function yesCopy() {
    // Nuanced yes copy based on Q4 + Q2
    const hasSymptoms = answers.q2.length > 0 && !answers.q2.includes('none');
    if (answers.q4 === 'meh') {
      return {
        headline: 'Creatine — this time, done right.',
        body: "Your answers suggest creatine is a strong fit. If you've tried it before without noticeable effect, it was likely the dose or the form. Pure micronized monohydrate at 3–5g daily is the studied amount — and the majority of off-the-shelf powders miss that mark. Olnian doesn't.",
      };
    }
    if (answers.q4 === 'good') {
      return {
        headline: 'You already know.',
        body: "You've felt the effect. Olnian is the cleanest version of it we know how to make — pharmaceutical-grade monohydrate, nothing else, tested for heavy metals every batch.",
      };
    }
    if (!hasSymptoms) {
      return {
        headline: 'A quiet yes.',
        body: "Even without specific symptoms, the research on women 30+ is some of the most compelling in the category — strength, cognition, bone density, mood. Creatine isn't a fix for a problem. It's a floor you set, daily.",
      };
    }
    return {
      headline: 'Creatine was made for this.',
      body: "Your answers suggest creatine + magnesium glycinate is a strong fit. The research on women in your demographic is some of the most compelling in the category — and Olnian is the cleanest version of it we know how to make. Every batch tested. Ships within days of production.",
    };
  }

  const v = verdict();
  const panelBg = v === 'yes' ? 'var(--tangerine)' : v === 'physician' ? 'var(--mint)' : 'var(--blush)';
  const panelFg = v === 'yes' ? 'var(--blush)' : 'var(--espresso)';

  return (
    <div
      role="dialog"
      aria-modal="true"
      onClick={onClose}
      style={{
        position: 'fixed', inset: 0, zIndex: 100,
        background: closing ? 'rgba(35, 12, 0, 0)' : 'rgba(35, 12, 0, 0.42)',
        backdropFilter: 'blur(4px)',
        WebkitBackdropFilter: 'blur(4px)',
        transition: 'background 240ms ease',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: '24px',
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: '100%',
          maxWidth: 720,
          maxHeight: 'calc(100vh - 48px)',
          overflow: 'auto',
          background: step === 5 ? panelBg : 'var(--blush)',
          color: step === 5 ? panelFg : 'var(--espresso)',
          position: 'relative',
          transform: closing ? 'translateY(16px)' : 'translateY(0)',
          opacity: closing ? 0 : 1,
          transition: 'transform 240ms ease, opacity 240ms ease',
        }}
      >
        {/* Close */}
        <button
          aria-label="Close"
          onClick={onClose}
          style={{
            position: 'absolute', top: 18, right: 18, zIndex: 2,
            width: 36, height: 36,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: step === 5 ? panelFg : 'var(--espresso)',
            opacity: 0.7,
          }}
        >
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path d="M3 3L15 15M15 3L3 15" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" />
          </svg>
        </button>

        {/* Progress dots for steps 1–4 */}
        {step >= 1 && step <= 4 && (
          <div style={{ padding: '28px 48px 0', display: 'flex', gap: 6, alignItems: 'center' }}>
            {[1, 2, 3, 4].map((n) => (
              <div key={n} style={{
                height: 2, flex: 1,
                background: n <= step ? 'var(--espresso)' : 'var(--espresso-12)',
                transition: 'background 180ms ease',
              }} />
            ))}
            <div style={{
              fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase',
              color: 'var(--espresso-60)', marginLeft: 14, fontVariantNumeric: 'tabular-nums',
            }}>
              {step} / 4
            </div>
          </div>
        )}

        {/* Content */}
        <div style={{ padding: step === 5 ? '72px 48px 56px' : '44px 48px 56px' }}>
          {step === 0 && (
            <QuizIntro onStart={() => setStep(1)} />
          )}

          {step === 1 && (
            <QuizQuestion
              label="Question 1"
              title="Are you a woman over 30?"
              options={[
                { v: 'yes', label: 'Yes' },
                { v: 'no', label: 'No' },
              ]}
              selected={answers.q1}
              onSelect={(v) => { setAnswers(a => ({...a, q1: v})); setTimeout(() => setStep(2), 160); }}
            />
          )}

          {step === 2 && (
            <QuizQuestion
              label="Question 2"
              title="Do you experience any of the following?"
              hint="Select all that apply."
              multi
              options={[
                { v: 'fog', label: 'Brain fog or difficulty concentrating' },
                { v: 'fatigue', label: 'Low energy or muscle fatigue' },
                { v: 'sleep', label: 'Poor or disrupted sleep' },
                { v: 'none', label: 'None of the above' },
              ]}
              selected={answers.q2}
              onSelect={(v) => {
                setAnswers(a => {
                  let next;
                  if (v === 'none') next = a.q2.includes('none') ? [] : ['none'];
                  else {
                    const cleaned = a.q2.filter(x => x !== 'none');
                    next = cleaned.includes(v) ? cleaned.filter(x => x !== v) : [...cleaned, v];
                  }
                  return { ...a, q2: next };
                });
              }}
              onContinue={answers.q2.length > 0 ? () => setStep(3) : null}
            />
          )}

          {step === 3 && (
            <QuizQuestion
              label="Question 3"
              title="Are you currently pregnant, breastfeeding, or managing a kidney condition?"
              options={[
                { v: 'no', label: 'No' },
                { v: 'yes', label: 'Yes' },
              ]}
              selected={answers.q3}
              onSelect={(v) => { setAnswers(a => ({...a, q3: v})); setTimeout(() => setStep(v === 'yes' ? 5 : 4), 160); }}
            />
          )}

          {step === 4 && (
            <QuizQuestion
              label="Question 4"
              title="Have you tried creatine before?"
              options={[
                { v: 'never', label: 'No, never tried it' },
                { v: 'meh', label: "Yes, and I didn't notice much" },
                { v: 'good', label: 'Yes, and I had a good experience' },
              ]}
              selected={answers.q4}
              onSelect={(v) => { setAnswers(a => ({...a, q4: v})); setTimeout(() => setStep(5), 160); }}
            />
          )}

          {step === 5 && (
            <QuizResult
              verdict={v}
              yesCopy={yesCopy()}
              onOrder={onOrder}
              onRetake={() => { setAnswers({ q1: null, q2: [], q3: null, q4: null }); setStep(1); }}
              onClose={onClose}
            />
          )}
        </div>
      </div>
    </div>
  );
}

function QuizIntro({ onStart }) {
  return (
    <div>
      <div style={{
        fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase',
        color: 'var(--espresso-60)',
      }}>
        Four questions · 30 seconds
      </div>
      <h2 className="display-md" style={{
        fontFamily: "'Instrument Serif', serif", fontStyle: 'italic',
        fontSize: 'clamp(44px, 6vw, 68px)', fontWeight: 400,
        lineHeight: 0.98, letterSpacing: '-0.02em',
        marginTop: 16,
        textWrap: 'balance',
      }}>
        Should I take creatine?
      </h2>
      <p style={{
        marginTop: 20, fontSize: 16, lineHeight: 1.55, maxWidth: 520,
        color: 'var(--espresso)', fontWeight: 300,
      }}>
        An honest look at whether Olnian is for you. No email required.
        No sales pitch if the answer is no.
      </p>
      <button
        onClick={onStart}
        style={{ ...ctaStyle(), marginTop: 36 }}
      >
        Begin <Arrow />
      </button>
      <p style={{
        marginTop: 40, fontSize: 11, color: 'var(--espresso-60)',
        opacity: 0.7, lineHeight: 1.5, maxWidth: 460, fontWeight: 300,
      }}>
        This quiz is for informational purposes only and does not constitute medical advice.
      </p>
    </div>
  );
}

function QuizQuestion({ label, title, hint, options, selected, onSelect, multi, onContinue }) {
  const isSelected = (v) => multi ? selected.includes(v) : selected === v;
  return (
    <div>
      <div style={{
        fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase',
        color: 'var(--espresso-60)', marginTop: 8,
      }}>
        {label}
      </div>
      <h2 style={{
        fontFamily: "'Instrument Serif', serif", fontStyle: 'italic',
        fontSize: 'clamp(34px, 4.6vw, 52px)', fontWeight: 400,
        lineHeight: 1.02, letterSpacing: '-0.015em',
        marginTop: 14, textWrap: 'balance',
      }}>
        {title}
      </h2>
      {hint && (
        <div style={{
          marginTop: 10, fontSize: 14, fontWeight: 300, color: 'var(--espresso-60)',
        }}>
          {hint}
        </div>
      )}
      <div style={{ marginTop: 32, display: 'flex', flexDirection: 'column', gap: 10 }}>
        {options.map(opt => (
          <button
            key={opt.v}
            onClick={() => onSelect(opt.v)}
            style={{
              width: '100%',
              padding: '18px 22px',
              border: '1px solid var(--espresso-30)',
              background: isSelected(opt.v) ? 'var(--tangerine)' : 'transparent',
              color: isSelected(opt.v) ? 'var(--blush)' : 'var(--espresso)',
              fontSize: 15, textAlign: 'left',
              fontFamily: 'inherit',
              transition: 'background 120ms ease, color 120ms ease',
              cursor: 'pointer',
            }}
          >
            {opt.label}
          </button>
        ))}
      </div>
      {multi && onContinue && (
        <button
          onClick={onContinue}
          style={{ ...ctaStyle(), marginTop: 24 }}
        >
          Continue <Arrow />
        </button>
      )}
    </div>
  );
}

function QuizResult({ verdict, yesCopy, onOrder, onRetake, onClose }) {
  let content;
  if (verdict === 'yes') {
    content = (
      <>
        <ResultHeadline>{yesCopy.headline}</ResultHeadline>
        <ResultBody>{yesCopy.body}</ResultBody>
        <button
          onClick={onOrder}
          style={{
            marginTop: 36,
            background: 'var(--espresso)', color: 'var(--blush)',
            padding: '18px 28px',
            fontSize: 14, letterSpacing: '0.02em',
            display: 'inline-flex', alignItems: 'center', gap: 12,
            cursor: 'pointer',
          }}
        >
          Order this batch <Arrow />
        </button>
      </>
    );
  } else if (verdict === 'no') {
    content = (
      <>
        <ResultHeadline>Creatine probably isn't your next move.</ResultHeadline>
        <ResultBody>
          Based on your answers, creatine isn't the right fit right now. That's the honest answer.
          If things change or you want to revisit, we'll be here.
        </ResultBody>
        <button
          onClick={onClose}
          className="uline"
          style={{
            marginTop: 32, fontSize: 14, color: 'var(--espresso-60)',
            background: 'transparent',
          }}
        >
          Learn what we make and why →
        </button>
      </>
    );
  } else {
    content = (
      <>
        <ResultHeadline>Talk to your doctor first.</ResultHeadline>
        <ResultBody>
          One of your answers flags a situation where a physician should weigh in before you
          start any new supplement. That's not a no — it's just the right order of operations.
          We'd rather you ask first.
        </ResultBody>
      </>
    );
  }

  return (
    <div>
      {content}
      <div style={{ marginTop: 48, display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 24 }}>
        <p style={{
          fontSize: 11, opacity: 0.5, lineHeight: 1.5, fontWeight: 300,
          maxWidth: 460,
        }}>
          This quiz is for informational purposes only and does not constitute medical advice.
        </p>
        <button
          onClick={onRetake}
          className="uline"
          style={{ fontSize: 12, opacity: 0.7, whiteSpace: 'nowrap' }}
        >
          Retake →
        </button>
      </div>
    </div>
  );
}

function ResultHeadline({ children }) {
  return (
    <h2 style={{
      fontFamily: "'Instrument Serif', serif", fontStyle: 'italic',
      fontSize: 'clamp(44px, 6vw, 72px)', fontWeight: 400,
      lineHeight: 0.96, letterSpacing: '-0.02em',
      textWrap: 'balance',
    }}>
      {children}
    </h2>
  );
}

function ResultBody({ children }) {
  return (
    <p style={{
      marginTop: 22, fontSize: 17, lineHeight: 1.55, maxWidth: 560,
      fontWeight: 300,
    }}>
      {children}
    </p>
  );
}

function Footer() {
  return (
    <footer style={{
      borderTop: '1px solid var(--espresso-12)',
      padding: '40px 32px',
      background: 'var(--blush)'
    }}>
      <div style={{
        maxWidth: 1320, margin: '0 auto',
        display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
        flexWrap: 'wrap', gap: 20
      }}>
        <div className="serif" style={{ fontSize: 24 }}>Olnian</div>
        <div style={{ fontSize: 12, color: 'var(--espresso-60)', display: 'flex', gap: 24, flexWrap: 'wrap' }}>
          <span>© 2026 Olnian Inc.</span>
          <a className="uline" href="#">Terms</a>
          <a className="uline" href="#">Privacy</a>
          <a className="uline" href="#">Contact</a>
        </div>
      </div>
    </footer>);

}

function TweakRow({ label, children }) {

    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 11, color: 'var(--espresso-60)', marginBottom: 4 }}>{label}</div>
      {children}
    </div>);
